<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポテト在庫システム（テスト版）</title>
  <style>
    /* 全体共通デザイン */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f4f6f9;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }
    .app-container {
      width: 100%;
      max-width: 480px;
      background-color: #fff;
      min-height: 100vh;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    header {
      background-color: #e67e22;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 1.1rem;
      position: relative;
    }
    .back-btn {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .content {
      padding: 15px;
      flex: 1;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .card-title {
      font-weight: bold;
      margin-bottom: 10px;
      border-left: 4px solid #e67e22;
      padding-left: 8px;
      color: #2c3e50;
    }
    
    /* ボタンデザイン */
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: #e67e22;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      box-sizing: border-box;
      margin-bottom: 15px;
    }
    .btn:active {
      background-color: #d35400;
    }
    .btn-secondary {
      background-color: #7f8c8d;
    }
    .btn-secondary:active {
      background-color: #2c3e50;
    }
    .btn-sm {
      padding: 5px 10px;
      font-size: 0.8rem;
      width: auto;
      display: inline-block;
      margin: 2px;
    }

    /* フォーム周り */
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .form-control {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .radio-group {
      display: flex;
      gap: 15px;
      margin-top: 5px;
    }

    /* テーブルデザイン */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.85rem;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #f8f9fa;
      font-weight: bold;
    }

    /* ステータスバッジのデザイン */
    .badge {
      display: inline-block;
      padding: 3px 6px;
      font-size: 0.75rem;
      font-weight: bold;
      border-radius: 4px;
    }
    .badge-pending {
      background-color: #ffe6d5;
      color: #d35400;
      border: 1px solid #ffccab;
    }
    .badge-success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    /* 在庫ダッシュボード用 */
    .stock-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }
    .summary-box {
      background: #fdf2e9;
      border: 1px solid #f5cba7;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
    }
    .summary-box.total {
      grid-column: span 2;
      background: #ebf5fb;
      border: 1px solid #a9dfbf;
    }
    .large-num {
      font-size: 1.5rem;
      font-weight: bold;
      color: #e67e22;
    }
    .summary-box.total .large-num {
      color: #27ae60;
    }

    /* ユーティリティ */
    .hidden {
      display: none !important;
    }
    .alert-success {
      background-color: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="app-container">
  
  <!-- ==================== HEADER ==================== -->
  <header id="app-header">
    <button class="back-btn hidden" id="back-button" onclick="goBack()">◀ メニューに戻る</button>
    <span id="header-title">ポテト在庫システム（テスト版）</span>
  </header>

  <div class="content">
    
    <!-- メッセージ通知エリア -->
    <div id="alert-msg" class="alert-success hidden"></div>

    <!-- ==================== MAIN MENU ==================== -->
    <div id="view-menu" class="view">
      <button class="btn" onclick="switchView('view-driver')">📦 1. 在庫確認・ダメージ報告</button>
      <button class="btn" onclick="switchView('view-leader')">👥 2. 最終チェック（リーダー用）</button>
      <button class="btn btn-secondary" onclick="switchView('view-admin-auth')">🔑 3. 管理者メニュー</button>
    </div>

    <!-- ==================== 1. 在庫確認・ダメージ報告 (現場用) ==================== -->
    <div id="view-driver" class="view hidden">
      <!-- 本日の引当後在庫 -->
      <div class="card">
        <div class="card-title">■ 📊 本日の引当後在庫</div>
        <div class="stock-summary">
          <div class="summary-box">
            <div>📥 本日の総入庫量</div>
            <div class="large-num" id="driver-sum-in">+0</div>
          </div>
          <div class="summary-box">
            <div>📤 本日の総出庫量</div>
            <div class="large-num" id="driver-sum-out">-0</div>
          </div>
          <div class="summary-box total">
            <div>現在の引当後総在庫</div>
            <div class="large-num" id="driver-total-stock">500 ケース</div>
            <div style="font-size: 0.8rem; color:#666;" id="driver-start-stock">(本日開始時: 510 ケース)</div>
          </div>
        </div>

        <div style="font-weight: bold; font-size: 0.9rem; margin-top: 15px;">▼ 賞味期限ごとの引当・増減内訳</div>
        <table>
          <thead>
            <tr>
              <th>賞味期限</th>
              <th>現在庫</th>
            </tr>
          </thead>
          <tbody id="driver-stock-table-body">
            <!-- 動的挿入 -->
          </tbody>
        </table>
      </div>

      <!-- ダメージ報告入力 -->
      <div class="card">
        <div class="card-title">⚠️ ダメージ報告入力</div>
        
        <div class="form-group">
          <label>(1) 賞味期限（ダメージ品）</label>
          <select class="form-control" id="dmg-target-date" onchange="syncReplenishDate()">
            <!-- 動的挿入 -->
          </select>
        </div>

        <div class="form-group">
          <label>(2) 数量 (ケース)</label>
          <input type="number" class="form-control" id="dmg-qty" value="10" min="1">
        </div>

        <div class="form-group">
          <label>(3) 補充の賞味期限</label>
          <select class="form-control" id="dmg-rep-date">
            <!-- 動的挿入 -->
          </select>
        </div>

        <button class="btn" onclick="submitDamageReport()">📤 ダメージ報告を登録する</button>
      </div>
    </div>

    <!-- ==================== 2. 最終チェック（リーダー用） ==================== -->
    <div id="view-leader" class="view hidden">
      <div class="card">
        <div class="card-title">■ 確定待ちデータ</div>
        <table>
          <thead>
            <tr>
              <th>状態</th>
              <th>区分</th>
              <th>賞味期限</th>
              <th>数量</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="leader-pending-body">
            <!-- 動的挿入 -->
          </tbody>
        </table>
      </div>

      <button class="btn" onclick="commitLeaderData()">🔒 データを確定（業務終了）</button>
      
      <button class="btn btn-secondary" onclick="toggleHistory()">⏳ これまでの確定履歴を表示する</button>

      <!-- 確定履歴一覧 -->
      <div class="card hidden" id="history-section">
        <div class="card-title">📋 確定履歴一覧（本日処理したもの）</div>
        <table>
          <thead>
            <tr>
              <th>状態</th>
              <th>確定日時</th>
              <th>区分</th>
              <th>賞味期限</th>
              <th>数量</th>
            </tr>
          </thead>
          <tbody id="history-table-body">
            <!-- 動的挿入 -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- ==================== 3. 管理者メニュー：認証 ==================== -->
    <div id="view-admin-auth" class="view hidden">
      <div class="card">
        <div class="card-title">🔑 パスワード認証</div>
        <div class="form-group">
          <input type="password" class="form-control" id="admin-pass" placeholder="パスワードを入力">
        </div>
        <button class="btn" onclick="unlockAdmin()">🔓 ロック解除</button>
      </div>
    </div>

    <!-- ==================== 3. 管理者メニュー：本体 ==================== -->
    <div id="view-admin-main" class="view hidden">
      
      <!-- 本日の入出庫 登録・変更 -->
      <div class="card">
        <div class="card-title">📥📤 本日の入出庫 登録・変更</div>
        
        <div style="font-weight: bold; font-size: 0.9rem; margin-bottom: 10px;">【 手動で1件ずつ入力 】</div>
        <div class="form-group">
          <label>(1) 区分</label>
          <div class="radio-group">
            <label><input type="radio" name="admin-io-type" value="入庫" checked> 入庫</label>
            <label><input type="radio" name="admin-io-type" value="出庫"> 出庫</label>
          </div>
        </div>
        <div class="form-group">
          <label>(2) 賞味期限</label>
          <select class="form-control" id="admin-io-date">
            <!-- 動的挿入 -->
          </select>
        </div>
        <div class="form-group">
          <label>(3) 数量</label>
          <input type="number" class="form-control" id="admin-io-qty" value="100" min="1">
        </div>
        <button class="btn btn-sm" onclick="submitAdminManual()">➕ 登録する</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">

        <div style="font-weight: bold; font-size: 0.9rem; margin-bottom: 10px;">【 コピペで一括登録 】</div>
        <div class="form-group">
          <textarea class="form-control" id="admin-paste-area" rows="4" placeholder="賞味期限[タブ]区分[タブ]数量 のように貼り付け"></textarea>
        </div>
        <button class="btn btn-sm" onclick="submitAdminPaste()">📋 一括登録を実行</button>
      </div>

      <!-- データ出力 -->
      <div class="card">
        <div class="card-title">💾 データ出力</div>
        <button class="btn" onclick="downloadCSV()">📥 CSVファイルでダウンロード</button>
      </div>

      <!-- 確定データ修正 -->
      <div class="card">
        <div class="card-title">✏️ 確定データ修正</div>
        <table>
          <thead>
            <tr>
              <th>区分</th>
              <th>賞味期限</th>
              <th>数量</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="admin-modify-body">
            <!-- 動的挿入 -->
          </tbody>
        </table>
      </div>

    </div>

  </div>
</div>

<script>
  // ==================== 初期データ設定 ====================
  // 本日の初期（開始時）在庫状態
  let startStock = {
    "2027/04/01": 10,
    "2027/05/01": 500,
    "2027/06/15": 0 // 本日新しく入る可能性のある枠
  };

  // 本日の入出庫トランザクション
  let transactions = [];

  // 確定完了した最終送信ログ（初期表示用ダミーデータ含む）
  let commitHistory = [
    { time: "07/16 11:30", type: "ダメージ", date: "2027/04/01", qty: 10 },
    { time: "07/16 11:30", type: "代替出庫", date: "2027/05/01", qty: 10 }
  ];

  // 画面遷移管理
  let viewHistory = ['view-menu'];

  window.onload = function() {
    updateSystemState();
  };

  // ==================== 状態更新 ＆ 画面反映 ====================
  function updateSystemState() {
    let currentStock = { ...startStock };
    let sumIn = 0;
    let sumOut = 0;

    // トランザクションを集計
    transactions.forEach(t => {
      if (t.type === '入庫') {
        currentStock[t.date] = (currentStock[t.date] || 0) + t.qty;
        sumIn += t.qty;
      } else {
        currentStock[t.date] = (currentStock[t.date] || 0) - t.qty;
        sumOut += t.qty;
      }
    });

    // --- 現場画面の更新 ---
    document.getElementById('driver-sum-in').innerText = `+${sumIn}`;
    document.getElementById('driver-sum-out').innerText = `-${sumOut}`;
    
    let totalStock = Object.values(currentStock).reduce((a, b) => a + b, 0);
    let totalStart = Object.values(startStock).reduce((a, b) => a + b, 0);
    document.getElementById('driver-total-stock').innerText = `${totalStock} ケース`;
    document.getElementById('driver-start-stock').innerText = `(本日開始時: ${totalStart} ケース)`;

    let tbody = document.getElementById('driver-stock-table-body');
    tbody.innerHTML = '';
    
    let selectDmg = document.getElementById('dmg-target-date');
    let selectRep = document.getElementById('dmg-rep-date');
    let selectAdmin = document.getElementById('admin-io-date');
    
    let currentDmgVal = selectDmg.value;
    let currentRepVal = selectRep.value;
    let currentAdminVal = selectAdmin.value;

    selectDmg.innerHTML = '';
    selectRep.innerHTML = '';
    selectAdmin.innerHTML = '';

    Object.keys(currentStock).sort().forEach((date, index) => {
      let qty = currentStock[date];
      let isOldest = (index === 0 && qty > 0) ? "【最古】" : "";
      
      let row = `<tr>
        <td style="text-align:left; padding-left:15px;">${isOldest}${date}</td>
        <td>${qty} ケース</td>
      </tr>`;
      tbody.innerHTML += row;

      let optText = `${date} (残${qty}ケース)`;
      selectDmg.innerHTML += `<option value="${date}">${optText}</option>`;
      selectRep.innerHTML += `<option value="${date}">${optText}</option>`;
      selectAdmin.innerHTML += `<option value="${date}">${date}</option>`;
    });

    if (currentDmgVal) selectDmg.value = currentDmgVal;
    if (currentRepVal) selectRep.value = currentRepVal;
    if (currentAdminVal) selectAdmin.value = currentAdminVal;

    // --- リーダー画面の更新（バッジ表示対応） ---
    let pendingBody = document.getElementById('leader-pending-body');
    pendingBody.innerHTML = '';
    let pendingTx = transactions.filter(t => t.status === 'pending');
    
    if (pendingTx.length === 0) {
      pendingBody.innerHTML = `<tr><td colspan="5" style="color:#999; padding:15px;">一時データはありません</td></tr>`;
    } else {
      pendingTx.forEach(t => {
        let row = `<tr>
          <td><span class="badge badge-pending">⚠️未確定</span></td>
          <td>${t.type}</td>
          <td>${t.date}</td>
          <td>${t.qty} 箱</td>
          <td>
            <button class="btn-sm" style="background:#f39c12; color:#fff; border:none; border-radius:3px;" onclick="editTx(${t.id})">修正</button>
            <button class="btn-sm" style="background:#e74c3c; color:#fff; border:none; border-radius:3px;" onclick="deleteTx(${t.id})">削除</button>
          </td>
        </tr>`;
        pendingBody.innerHTML += row;
      });
    }

    // 確定履歴テーブル（✅報告済バッジを付与）
    let historyBody = document.getElementById('history-table-body');
    historyBody.innerHTML = '';
    commitHistory.forEach(h => {
      let row = `<tr>
        <td><span class="badge badge-success">✅報告済</span></td>
        <td>${h.time}</td>
        <td>${h.type}</td>
        <td>${h.date}</td>
        <td>${h.qty} 箱</td>
      </tr>`;
      historyBody.innerHTML += row;
    });

    // --- 管理者画面 確定データ修正の更新 ---
    let adminModifyBody = document.getElementById('admin-modify-body');
    adminModifyBody.innerHTML = '';
    let committedTx = transactions.filter(t => t.status === 'committed');

    if (committedTx.length === 0) {
      adminModifyBody.innerHTML = `<tr><td colspan="4" style="color:#999; padding:15px;">確定データはありません</td></tr>`;
    } else {
      committedTx.forEach(t => {
        let row = `<tr>
          <td>${t.type}</td>
          <td>${t.date}</td>
          <td>${t.qty} 箱</td>
          <td>
            <button class="btn-sm" style="background:#f39c12; color:#fff; border:none; border-radius:3px;" onclick="editTx(${t.id})">修正</button>
            <button class="btn-sm" style="background:#e74c3c; color:#fff; border:none; border-radius:3px;" onclick="deleteTx(${t.id})">削除</button>
          </td>
        </tr>`;
        adminModifyBody.innerHTML += row;
      });
    }
  }

  // ==================== ダメージ報告 ====================
  function syncReplenishDate() {
    let dmgDate = document.getElementById('dmg-target-date').value;
    document.getElementById('dmg-rep-date').value = dmgDate;
  }

  function submitDamageReport() {
    let dmgDate = document.getElementById('dmg-target-date').value;
    let qty = parseInt(document.getElementById('dmg-qty').value) || 0;
    let repDate = document.getElementById('dmg-rep-date').value;

    if (qty <= 0) {
      alert("正しい数量を入力してください。");
      return;
    }

    transactions.push({
      id: Date.now(),
      type: 'ダメージ',
      date: dmgDate,
      qty: qty,
      status: 'pending'
    });

    transactions.push({
      id: Date.now() + 1,
      type: '代替出庫',
      date: repDate,
      qty: qty,
      status: 'pending'
    });

    updateSystemState();
    showAlert("一時ダメージ報告を登録しました！リーダー確認をお待ちください。");
    switchView('view-menu');
  }

  // ==================== リーダー機能 ====================
  function commitLeaderData() {
    let pendingTx = transactions.filter(t => t.status === 'pending');
    if (pendingTx.length === 0) {
      alert("確定待ちの一時保存データはありません。");
      return;
    }

    let now = new Date();
    let timeStr = `${("0" + (now.getMonth() + 1)).slice(-2)}/${("0" + now.getDate()).slice(-2)} ${("0" + now.getHours()).slice(-2)}:${("0" + now.getMinutes()).slice(-2)}`;

    pendingTx.forEach(t => {
      t.status = 'committed'; // 本番確定へ
      commitHistory.unshift({
        time: timeStr,
        type: t.type,
        date: t.date,
        qty: t.qty
      });
    });

    updateSystemState();
    showAlert("データを送信し、一括確定（業務終了）しました！");
    switchView('view-menu');
  }

  function toggleHistory() {
    let section = document.getElementById('history-section');
    section.classList.toggle('hidden');
  }

  // ==================== 管理者機能 ====================
  function unlockAdmin() {
    let pass = document.getElementById('admin-pass').value;
    if (pass === "1234") {
      document.getElementById('view-admin-auth').classList.add('hidden');
      document.getElementById('view-admin-main').classList.remove('hidden');
    } else {
      alert("パスワードが違います（テスト用は 1234 です）");
    }
  }

  function submitAdminManual() {
    let types = document.getElementsByName('admin-io-type');
    let type = "入庫";
    for(let r of types) { if(r.checked) type = r.value; }
    
    let date = document.getElementById('admin-io-date').value;
    let qty = parseInt(document.getElementById('admin-io-qty').value) || 0;

    if (qty <= 0) {
      alert("正しい数量を入力してください");
      return;
    }

    transactions.push({
      id: Date.now(),
      type: type,
      date: date,
      qty: qty,
      status: 'committed'
    });

    updateSystemState();
    showAlert(`管理データに 【${type}: ${date} - ${qty}ケース】 を追加しました`);
  }

  function submitAdminPaste() {
    let text = document.getElementById('admin-paste-area').value.trim();
    if (!text) {
      alert("貼り付けエリアが空です");
      return;
    }

    let rows = text.split('\n');
    let count = 0;

    rows.forEach((rowStr, i) => {
      let cols = rowStr.split('\t');
      if (cols.length >= 3) {
        let date = cols[0].trim();
        let type = cols[1].trim();
        let qty = parseInt(cols[2].trim()) || 0;

        if (qty > 0 && (type === '入庫' || type === '出庫')) {
          transactions.push({
            id: Date.now() + i,
            type: type,
            date: date,
            qty: qty,
            status: 'committed'
          });
          count++;
        }
      }
    });

    updateSystemState();
    document.getElementById('admin-paste-area').value = '';
    showAlert(`貼り付けデータから ${count} 件を一括登録しました！`);
  }

  function editTx(id) {
    let t = transactions.find(item => item.id === id);
    if (!t) return;
    
    let newQtyStr = prompt(`${t.date} [${t.type}] の数量を変更してください`, t.qty);
    if (newQtyStr === null) return;

    let newQty = parseInt(newQtyStr) || 0;
    if (newQty <= 0) {
      alert("数量は1以上で入力してください");
      return;
    }

    t.qty = newQty;
    updateSystemState();
    showAlert("数量の修正を反映しました");
  }

  function deleteTx(id) {
    if (!confirm("このデータを削除してもよろしいですか？")) return;
    transactions = transactions.filter(item => item.id !== id);
    updateSystemState();
    showAlert("データを削除しました");
  }

  function downloadCSV() {
    let csvContent = "\uFEFF"; 
    csvContent += "ステータス,区分,賞味期限,数量(ケース)\n";
    
    transactions.forEach(t => {
      csvContent += `${t.status},${t.type},${t.date},${t.qty}\n`;
    });

    let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    let url = URL.createObjectURL(blob);
    let link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", "potato_inventory_data.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  // ==================== ユーティリティ ====================
  function switchView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.getElementById(viewId).classList.remove('hidden');

    let backBtn = document.getElementById('back-button');
    let titleSpan = document.getElementById('header-title');

    if (viewId === 'view-menu') {
      backBtn.classList.add('hidden');
      titleSpan.innerText = "ポテト在庫システム（テスト版）";
      viewHistory = ['view-menu'];
    } else {
      backBtn.classList.remove('hidden');
      viewHistory.push(viewId);
      
      if (viewId === 'view-driver') titleSpan.innerText = "在庫確認・ダメージ報告";
      if (viewId === 'view-leader') titleSpan.innerText = "最終チェック";
      if (viewId === 'view-admin-auth' || viewId === 'view-admin-main') titleSpan.innerText = "管理者メニュー";
    }
  }

  function goBack() {
    if (viewHistory.length > 1) {
      viewHistory.pop();
      let prevView = viewHistory[viewHistory.length - 1];
      switchView(prevView);
    } else {
      switchView('view-menu');
    }
  }

  function showAlert(msg) {
    let alertDiv = document.getElementById('alert-msg');
    alertDiv.innerText = msg;
    alertDiv.classList.remove('hidden');
    setTimeout(() => {
      alertDiv.classList.add('hidden');
    }, 4000);
  }
</script>
